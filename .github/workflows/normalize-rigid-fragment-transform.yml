name: Normalize rigid fragment transform formatting

on:
  push:
    branches: [dev]
    paths:
      - .github/workflows/normalize-rigid-fragment-transform.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Normalize patched blocks
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('packages/generator-core/src/deepTimePipeline.ts')
          text = path.read_text(encoding='utf-8')
          old_transform = """    const rotation = buildTangentSphericalRotation(
            { x: seed.x, y: seed.y, z: seed.z },
            motionX,
            motionY,
            displacement
          );
          if (displacement > 0) movingFragmentCount += 1;
          displacementTotal += displacement;
          maxDisplacement = Math.max(maxDisplacement, displacement);
          for (const sourceCell of seed.cells) {
            const rotatedTarget = rotateUnitVector(
              {
                x: topology.positions[sourceCell * 3],
                y: topology.positions[sourceCell * 3 + 1],
                z: topology.positions[sourceCell * 3 + 2]
              },
              rotation
            );
            const targetCoordinates = unitVectorToLonLat(rotatedTarget);
            const desiredTarget = cubedSphereCellForLonLat(topology, targetCoordinates.longitude, targetCoordinates.latitude);
          let targetCell = desiredTarget;
          if (targetClaims[desiredTarget]) {
            collisionCells[desiredTarget] = 1;
            const spillTarget = findBestUnclaimedTransformTarget(
              topology,
              desiredTarget,
              targetClaims,
              rotatedTarget,
              3
            );
"""
          new_transform = """    const rotation = buildTangentSphericalRotation(
              { x: seed.x, y: seed.y, z: seed.z },
              motionX,
              motionY,
              displacement
            );
            if (displacement > 0) movingFragmentCount += 1;
            displacementTotal += displacement;
            maxDisplacement = Math.max(maxDisplacement, displacement);
            for (const sourceCell of seed.cells) {
              const rotatedTarget = rotateUnitVector(
                {
                  x: topology.positions[sourceCell * 3],
                  y: topology.positions[sourceCell * 3 + 1],
                  z: topology.positions[sourceCell * 3 + 2]
                },
                rotation
              );
              const targetCoordinates = unitVectorToLonLat(rotatedTarget);
              const desiredTarget = cubedSphereCellForLonLat(topology, targetCoordinates.longitude, targetCoordinates.latitude);
              let targetCell = desiredTarget;
              if (targetClaims[desiredTarget]) {
                collisionCells[desiredTarget] = 1;
                const spillTarget = findBestUnclaimedTransformTarget(
                  topology,
                  desiredTarget,
                  targetClaims,
                  rotatedTarget,
                  3
                );
"""
          if old_transform not in text:
            raise SystemExit('Could not locate transform formatting block')
          text = text.replace(old_transform, new_transform, 1)

          old_preview = """    const rotation = buildRotationBetweenUnitVectors(
            vectorFromLonLat(first.longitudeRadians, first.latitudeRadians),
            vectorFromLonLat(last.longitudeRadians, last.latitudeRadians)
          );
"""
          new_preview = """    const rotation = buildRotationBetweenUnitVectors(
              vectorFromLonLat(first.longitudeRadians, first.latitudeRadians),
              vectorFromLonLat(last.longitudeRadians, last.latitudeRadians)
            );
"""
          if old_preview not in text:
            raise SystemExit('Could not locate preview formatting block')
          text = text.replace(old_preview, new_preview, 1)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/normalize-rigid-fragment-transform.yml').unlink()
          PY
      - run: npm ci
      - run: npm run verify
      - name: Commit cleanup
        shell: bash
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Normalize rigid fragment transform implementation"
          git push origin HEAD:dev
